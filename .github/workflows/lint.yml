name: lint
on: push
jobs:
    lint:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/checkout@v6
        - name: Set up Python
          uses: actions/setup-python@v6
          with:
            python-version: '3.14'
          # make depends on uv
        - name: Install dependencies
          run: |
            pip install uv
            make install
        - run: | 
            make lint